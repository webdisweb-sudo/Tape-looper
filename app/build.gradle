plugins {
    id 'com.android.application'
}
android {
    namespace 'com.tapelooper.app'
    compileSdk 34
    defaultConfig {
        applicationId "com.tapelooper.app"
        minSdk 24
        targetSdk 34
        versionCode 3
        versionName "1.2"
    }
    buildTypes {
        debug { minifyEnabled false }
        release { minifyEnabled false }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
dependencies {
}
