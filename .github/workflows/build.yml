name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "PATH=$PATH:/opt/gradle-8.5/bin" >> $GITHUB_ENV

      - name: Create wrapper
        run: |
          /opt/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore release.jks -alias tape -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass password123 -keypass password123 \
            -dname "CN=TapeLooper, OU=Dev, O=Dev, L=City, S=State, C=US"
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks release.jks --ks-key-alias tape \
            --ks-pass pass:password123 --key-pass pass:password123 \
            --out app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tape-looper-release
          path: app-release-signed.apk
          retention-days: 30
